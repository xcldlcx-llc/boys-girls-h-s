<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kangaroo Crossing</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(to bottom, #7c1f1a, #551210);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  #stage { position: relative; width: 100%; height: 100%; }
  canvas { display: block; width: 100%; height: 100%; outline: none; }
  canvas.flash { animation: flash .2s ease; }
  @keyframes flash { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(2.2) saturate(0); } }

  #hud {
    position: absolute; top: 6px; left: 10px; z-index: 3;
    color: #fff; font-weight: 900; font-size: 13px; letter-spacing: .02em;
    text-shadow: 0 1px 2px rgba(0,0,0,.5); pointer-events: none;
  }
  #hud .best { color: rgba(255,255,255,.6); font-weight: 700; }

  #closeBtn {
    position: absolute; top: 4px; right: 4px; z-index: 3;
    width: 26px; height: 26px; border-radius: 999px; border: 0; cursor: pointer;
    background: rgba(0,0,0,.4); color: #fff; font-size: 13px; font-weight: 900;
    display: grid; place-items: center;
  }
  #closeBtn:hover { background: rgba(0,0,0,.6); }

  #pad {
    position: absolute; right: 6px; bottom: 6px; z-index: 3;
    display: none; flex-direction: column; align-items: center; gap: 3px;
  }
  @media (pointer: coarse) { #pad { display: flex; } }
  #pad .row { display: flex; gap: 3px; }
  #pad button {
    width: 30px; height: 30px; border-radius: 7px; border: 0; cursor: pointer;
    background: rgba(0,0,0,.42); color: #fff; font-size: 13px;
  }

  #overlay {
    position: absolute; inset: 0; z-index: 4; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    background: rgba(10,8,8,.72); text-align: center; padding: 0 16px;
  }
  #overlay.show { display: flex; }
  #overlay p { margin: 0; color: #fff; font-weight: 900; font-size: 15px; }
  #overlay button {
    border: 0; cursor: pointer; border-radius: 999px; padding: 7px 20px;
    background: #e81c25; color: #fff; font-weight: 900; font-size: 13px;
  }
  #overlay button:hover { background: #c9151d; }

  #reduced-motion-note {
    position: absolute; inset: 0; z-index: 5; display: none;
    align-items: center; justify-content: center; text-align: center; padding: 0 20px;
    color: #fff; font-weight: 700; font-size: 13px; background: rgba(10,8,8,.5);
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" role="application" aria-label="Kangaroo Crossing mini-game" tabindex="0"></canvas>
  <div id="hud">Score: <span id="score">0</span> <span class="best">· Best: <span id="best">0</span></span></div>
  <button id="closeBtn" type="button" aria-label="Close mini-game">✕</button>
  <div id="pad" aria-hidden="true">
    <div class="row"><button id="btnUp" type="button" aria-label="Move up">▲</button></div>
    <div class="row">
      <button id="btnLeft" type="button" aria-label="Move left">◀</button>
      <button id="btnDown" type="button" aria-label="Move down">▼</button>
      <button id="btnRight" type="button" aria-label="Move right">▶</button>
    </div>
  </div>
  <div id="overlay">
    <p id="overlayText">Game Over — Score: 0</p>
    <button id="restartBtn" type="button">Play Again</button>
  </div>
  <div id="reduced-motion-note">Motion is turned off in your browser settings, so this mini-game is paused.</div>
  <p id="announce" class="sr-only" role="status" aria-live="polite"></p>
</div>
<script>
(function () {
  "use strict";

  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reducedMotion) {
    document.getElementById("reduced-motion-note").style.display = "flex";
    return;
  }

  var HIGH_SCORE_KEY = "bghs-mascot-highscore";
  var ROW_HEIGHT = 36;
  var CELL = 46;
  var OBSTACLES_PER_ROW_MIN = 2;
  var EMOJIS = ["📚", "🎒", "⚽", "✏️", "🍎", "📐", "🖍️", "🎓"];

  var stage = document.getElementById("stage");
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var overlay = document.getElementById("overlay");
  var overlayText = document.getElementById("overlayText");
  var announceEl = document.getElementById("announce");
  var closeBtn = document.getElementById("closeBtn");
  var restartBtn = document.getElementById("restartBtn");

  var kangarooImg = new Image();
  kangarooImg.src = "/mascot-kangaroo.png";

  var dpr = Math.min(2, window.devicePixelRatio || 1);
  var width = 0, height = 0, cols = 13, visibleRows = 5;

  function seededRandom(seed) {
    var s = seed >>> 0;
    return function () {
      s = (s + 0x6d2b79f5) >>> 0;
      var t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function isSafeRow(index) { return index === 0 || (index % 4 === 0 && index > 0); }

  function generateRow(index) {
    var safe = isSafeRow(index);
    if (safe) return { index: index, safe: true, obstacles: [] };
    var rand = seededRandom(index * 7919 + 13);
    var dir = index % 2 === 0 ? 1 : -1;
    var speed = Math.min(48, 16 + index * 0.55);
    var count = Math.max(OBSTACLES_PER_ROW_MIN, Math.round(cols / 4.2));
    var obstacles = [];
    for (var i = 0; i < count; i++) {
      obstacles.push({
        x0: (i * (100 / count) + rand() * 10) % 100,
        dir: dir,
        speed: speed,
        emoji: EMOJIS[Math.floor(rand() * EMOJIS.length)],
        bobPhase: rand() * Math.PI * 2,
      });
    }
    return { index: index, safe: false, obstacles: obstacles };
  }

  function obstacleX(o, elapsedSec) {
    var x = o.x0 + o.dir * o.speed * elapsedSec;
    x = ((x % 100) + 100) % 100;
    return x;
  }

  var player = { row: 0, col: 6 };
  var cameraRow = 0;
  var score = 0;
  var highScore = Number(window.localStorage.getItem(HIGH_SCORE_KEY) || 0) || 0;
  var status = "playing";
  var startTime = performance.now();
  var landAnim = 0; // 0..1, squash-and-stretch on landing

  bestEl.textContent = String(highScore);

  function resize() {
    var rect = stage.getBoundingClientRect();
    width = rect.width;
    height = rect.height;
    cols = Math.max(9, Math.floor(width / CELL));
    visibleRows = Math.max(4, Math.floor((height - 26) / ROW_HEIGHT));
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  var ro = new ResizeObserver(resize);
  ro.observe(stage);

  function setScore(row) {
    if (row > score) {
      score = row;
      scoreEl.textContent = String(score);
      if (score > highScore) {
        highScore = score;
        bestEl.textContent = String(highScore);
        window.localStorage.setItem(HIGH_SCORE_KEY, String(highScore));
      }
    }
  }

  function move(dCol, dRow) {
    if (status !== "playing") return;
    player.col = Math.min(cols - 1, Math.max(0, player.col + dCol));
    var nextRow = Math.max(0, player.row + dRow);
    if (nextRow !== player.row) landAnim = 1;
    player.row = nextRow;
    setScore(player.row);
    cameraRow = Math.max(0, Math.max(cameraRow, player.row - 1));
  }

  function restart() {
    player = { row: 0, col: Math.floor(cols / 2) };
    cameraRow = 0;
    score = 0;
    scoreEl.textContent = "0";
    status = "playing";
    overlay.classList.remove("show");
    startTime = performance.now();
    announce("New game started.");
  }

  function announce(text) { announceEl.textContent = text; }

  function gameOver() {
    status = "gameover";
    overlayText.textContent = "Game Over — Score: " + score;
    overlay.classList.add("show");
    announce("Game over. Final score " + score + ".");
    canvas.classList.add("flash");
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      window.parent.postMessage({ type: "bghs-mascot-game-close" }, "*");
      return;
    }
    if (status === "gameover" && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      restart();
      return;
    }
    var map = { ArrowUp: [0, 1], ArrowDown: [0, -1], ArrowLeft: [-1, 0], ArrowRight: [1, 0] };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key][0], map[e.key][1]);
    }
  });

  closeBtn.addEventListener("click", function () {
    window.parent.postMessage({ type: "bghs-mascot-game-close" }, "*");
  });
  restartBtn.addEventListener("click", restart);
  document.getElementById("btnUp").addEventListener("click", function () { move(0, 1); });
  document.getElementById("btnDown").addEventListener("click", function () { move(0, -1); });
  document.getElementById("btnLeft").addEventListener("click", function () { move(-1, 0); });
  document.getElementById("btnRight").addEventListener("click", function () { move(1, 0); });

  canvas.addEventListener("click", function () { canvas.focus(); });
  canvas.focus();

  function drawLaneBackground(y, rowH, safe, active, scrollOffset) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, y, width, rowH);
    ctx.clip();
    ctx.fillStyle = safe ? "rgba(255,255,255,.09)" : "rgba(0,0,0,.08)";
    ctx.fillRect(0, y, width, rowH);
    if (active) {
      ctx.fillStyle = "rgba(242,176,30,.08)";
      ctx.fillRect(0, y, width, rowH);
    }
    ctx.strokeStyle = "rgba(255,255,255,.14)";
    ctx.lineWidth = 2;
    var laneStep = 40;
    ctx.setLineDash([3, 3]);
    ctx.lineDashOffset = -scrollOffset;
    ctx.beginPath();
    ctx.moveTo(0, y + rowH / 2);
    ctx.lineTo(width, y + rowH / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function draw(nowMs) {
    var elapsed = (nowMs - startTime) / 1000;
    ctx.clearRect(0, 0, width, height);

    var playAreaTop = 24;
    var playAreaHeight = height - playAreaTop - 2;

    for (var r = cameraRow; r <= cameraRow + visibleRows + 1; r++) {
      var row = generateRow(r);
      var yFromBottom = (r - cameraRow) * ROW_HEIGHT;
      var y = playAreaTop + playAreaHeight - ROW_HEIGHT - yFromBottom;
      if (y + ROW_HEIGHT < playAreaTop || y > height) continue;
      drawLaneBackground(y, ROW_HEIGHT, row.safe, r === player.row, elapsed * 14 + r * 9);

      if (!row.safe) {
        for (var i = 0; i < row.obstacles.length; i++) {
          var o = row.obstacles[i];
          var x = (obstacleX(o, elapsed) / 100) * width;
          var bob = Math.sin(elapsed * 4 + o.bobPhase) * 2.5;
          ctx.save();
          ctx.font = "20px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          if (o.dir === -1) {
            ctx.translate(x, y + ROW_HEIGHT / 2 + bob);
            ctx.scale(-1, 1);
            ctx.fillText(o.emoji, 0, 0);
          } else {
            ctx.fillText(o.emoji, x, y + ROW_HEIGHT / 2 + bob);
          }
          ctx.restore();
        }
      }
    }

    // player
    var playerYFromBottom = (player.row - cameraRow) * ROW_HEIGHT;
    var playerY = playAreaTop + playAreaHeight - ROW_HEIGHT - playerYFromBottom;
    var px = (player.col + 0.5) * (width / cols);
    var squash = 1 + landAnim * 0.18;
    if (landAnim > 0) landAnim = Math.max(0, landAnim - 0.06);

    if (kangarooImg.complete && kangarooImg.naturalWidth > 0) {
      var size = 30;
      ctx.save();
      ctx.translate(px, playerY + ROW_HEIGHT / 2);
      ctx.scale(squash, 1 / squash);
      ctx.drawImage(kangarooImg, -size / 2, -size / 2 - 4, size, size);
      ctx.restore();
    }

    // collision check (skip while game already over)
    if (status === "playing") {
      var currentRow = generateRow(player.row);
      if (!currentRow.safe) {
        var playerXPercent = (player.col + 0.5) * (100 / cols);
        for (var j = 0; j < currentRow.obstacles.length; j++) {
          var ob = currentRow.obstacles[j];
          var ox = obstacleX(ob, elapsed);
          var dist = Math.min(Math.abs(ox - playerXPercent), 100 - Math.abs(ox - playerXPercent));
          var widthPercent = (100 / cols) * 0.55;
          if (dist < widthPercent) {
            gameOver();
            break;
          }
        }
      }
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
